name: CI Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  test:
    name: Tests (Node ${{ matrix.node-version }})
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./app

    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Generate test report file
        if: always()
        run: |
          mkdir -p test-results
          {
            echo "# Test Report"
            echo ""
            echo "| Field      | Value |"
            echo "|------------|-------|"
            echo "| Node.js    | ${{ matrix.node-version }} |"
            echo "| OS         | ${{ runner.os }} |"
            echo "| Ref        | \`${{ github.ref_name }}\` |"
            echo "| Commit     | \`${{ github.sha }}\` |"
            echo "| Job status | ${{ job.status }} |"
            echo "| Timestamp  | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |"
          } > test-results/report.md

      - name: Upload test report artifact
        if: matrix.node-version == 20 && always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-node-${{ matrix.node-version }}
          path: app/test-results/
          retention-days: 7

      - name: Write step summary
        if: always()
        run: |
          {
            echo "## Test Results — Node ${{ matrix.node-version }}"
            echo ""
            echo "| Metryka | Wartość |"
            echo "|---------|---------|"
            echo "| Node.js version | \`${{ matrix.node-version }}\` |"
            echo "| Runner OS | ${{ runner.os }} |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Commit | \`${GITHUB_SHA::8}\` |"
            echo "| Status | ${{ job.status }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run build (syntax validation)
        run: npm run build

      - name: Compute artifact size
        id: size
        run: |
          SIZE=$(du -sh src/ | cut -f1)
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Write build summary
        run: |
          {
            echo "## Build Report ✅"
            echo ""
            echo "| Metryka | Wartość |"
            echo "|---------|---------|"
            echo "| Build status | **Success** |"
            echo "| Node.js version | \`${{ env.NODE_VERSION }}\` |"
            echo "| Source size | ${{ steps.size.outputs.size }} |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Commit | \`${GITHUB_SHA::8}\` |"
            echo "| Completed at | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |"
          } >> "$GITHUB_STEP_SUMMARY"
